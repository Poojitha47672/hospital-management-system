<!DOCTYPE html>
<html>
<head>
    <title>HMS - Hospital Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
        }

        nav {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        nav a:hover { background: #34495e; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 18px;
            margin: 25px 0 10px;
            color: #2c3e50;
        }

        h4 { margin: 15px 0 8px; color: #555; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 11px 16px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9fa; }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: white; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus { border-color: #3498db; }

        input[type="submit"], button[type="submit"] {
            background: #3498db;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        input[type="submit"]:hover, button[type="submit"]:hover {
            background: #2980b9;
        }

        .badge-available {
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .badge-booked {
            background: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .link-calendar {
            display: inline-block;
            margin-bottom: 16px;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .link-calendar:hover { text-decoration: underline; }

        p { margin: 10px 0; font-size: 14px; color: #555; }
        a { color: #3498db; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'login' %}">🏥 HMS</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Signup</a>
        <a href="{% url 'logout' %}">Logout</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
